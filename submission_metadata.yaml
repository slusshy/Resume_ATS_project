ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  Used Cursor/Claude for architecture design and implementation.
  No candidate data was sent to external LLM APIs during ranking.

methodology_summary: |
  Recruiter-style hybrid ranker: title/role fit is the primary signal (not keyword density).
  Career narratives are scored for production retrieval/ranking evidence; skills are trusted
  only when backed by duration and endorsements. Honeypots are filtered via title-career
  coherence, chronology validation, and reject-role exclusion. Two-stage pipeline coarse-filters
  100K profiles then deep-scores top 5K. Optional bge-small narrative embeddings are research-only;
  the official submission path is deterministic, CPU-only, offline, and requires no pre-computation.
  Same RecruiterScorer powers hackathon submission and FastAPI /analyze/ endpoint.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
